<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>انتخاب لوکیشن</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:linear-gradient(135deg,#00b894,#0984e3);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#fff;
border-radius:25px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
font-size:55px;
text-align:center;
}

h1{
text-align:center;
margin-top:10px;
color:#222;
font-size:28px;
}

.subtitle{
text-align:center;
color:#666;
margin:10px 0 25px;
font-size:15px;
}

.card{
display:flex;
align-items:center;
justify-content:space-between;
background:#f8f8f8;
border-radius:18px;
padding:16px 18px;
margin-bottom:15px;
text-decoration:none;
transition:.25s;
color:#222;
}

.card:hover{
background:#00b894;
color:white;
transform:translateY(-3px);
}

.place{
font-size:17px;
font-weight:bold;
}

.icon{
font-size:28px;
}

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">📍</div>

<h1>انتخاب مقصد</h1>

<div class="subtitle">
یکی از مکان‌های زیر را انتخاب کنید
</div>

<a class="card" href="https://nshn.ir/2bvJtw5xQz2Q">
<div class="place">مجموعه نیک کالا</div>
<div class="icon">🏢</div>
</a>

<a class="card" href="https://nshn.ir/rbvLs-0x1J9L">
<div class="place">امام زاده طاهر</div>
<div class="icon">🕌</div>
</a>

<a class="card" href="https://nshn.ir/SbvfcB5xWHuu">
<div class="place">متروی محمدشهر</div>
<div class="icon">🚇</div>
</a>

<a class="card" href="https://nshn.ir/rbvvY70xLJSh">
<div class="place">متروی فردیس</div>
<div class="icon">🚉</div>
</a>

<a class="card" href="https://nshn.ir/2bvSHNGx5FNT">
<div class="place">مجموعه ایوان</div>
<div class="icon">🏛️</div>
</a>

<a class="card" href="https://nshn.ir/2bv7LTVxC7KN">
<div class="place">پادگان شهید مدرس</div>
<div class="icon">🎖️</div>
</a>

<div class="footer">
با لمس هر کارت، مسیر در اپلیکیشن نشان باز می‌شود.
</div>

</div>

</body>
</html>
